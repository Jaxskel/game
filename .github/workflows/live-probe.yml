name: live-probe
on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/live-probe.mjs"
      - "scripts/live-ingest-test.ts"
      - "lib/pdf/textToPdf.ts"
      - ".github/workflows/live-probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe the deployed app's API endpoints
        run: node scripts/live-probe.mjs
      - name: Confirm latest build is live on Vercel
        run: node scripts/deploy-check.mjs
      - name: Multi-book search + download sweep
        run: node scripts/book-sweep.mjs
      - name: Install deps
        run: npm ci
      - name: Full ingest pipeline on real book texts
        run: npx -y tsx scripts/live-ingest-test.ts
